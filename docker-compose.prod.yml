# =============================================================================
# docker-compose.prod.yml — Production-like preview environment
# =============================================================================
# WHAT: Builds the full multi-stage image and runs the standalone server,
#       mirroring how the app behaves on Vercel. No source mounts, no
#       hot reload — this is for verifying production builds locally
#       before deploying.
#
# USAGE:
#   docker compose -f docker-compose.prod.yml up --build
#
# REQUIRES: next.config.ts must export `output: "standalone"` (Phase 5).
#           Without it, the runner stage will fail to find server.js.
# =============================================================================

services:
  app:
    build:
      context: .
      target: runner
    image: hjem-kensington-prod
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
